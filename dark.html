<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Metrics Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap');

        :root {
            --bg-color: #f0f2f5;
            --sidebar-color: #ffffff;
            --text-color: #1a202c;
            --accent-color: #007aff;
            --card-bg: #ffffff;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
            display: flex;
        }

        /* Sidebar */
        nav {
            width: 240px;
            height: 100vh;
            background: var(--sidebar-color);
            padding: 30px;
            position: fixed;
            border-right: 1px solid rgba(0,0,0,0.08);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 12px 0;
            font-weight: 500;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }

        .nav-links li:hover {
            opacity: 1;
            padding-left: 5px;
            color: var(--accent-color);
        }

        /* Main Content */
        main {
            margin-left: 240px;
            padding: 40px;
            width: calc(100% - 240px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
        }

        /* Dashboard Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            margin-bottom: 15px;
        }

        .card .value {
            font-size: 26px;
            font-weight: 700;
        }

        .status {
            font-size: 13px;
            margin-top: 8px;
            font-weight: 500;
        }

        .up { color: #2ecc71; }
        .down { color: #e74c3c; }

        @media (max-width: 768px) {
            nav { width: 80px; padding: 20px 10px; }
            .logo, .nav-links span { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CORE_UI</div>
        <ul class="nav-links">
            <li><span>Overview</span></li>
            <li><span>Analytics</span></li>
            <li><span>IoT Nodes</span></li>
            <li><span>Settings</span></li>
        </ul>
    </nav>

    <main>
        <header>
            <h1>Developer Console</h1>
            <button class="theme-toggle" onclick="toggleTheme()">Switch Theme</button>
        </header>

        <div class="grid">
            <!-- Card 1 -->
            <div class="card">
                <h3>Total Revenue</h3>
                <div class="value">₹48,250.00</div>
                <div class="status up">▲ 18.4% from last week</div>
            </div>
            <!-- Card 2 -->
            <div class="card">
                <h3>Cloud Expenses</h3>
                <div class="value">₹12,400.00</div>
                <div class="status down">▼ 4.2% optimized</div>
            </div>
            <!-- Card 3 -->
            <div class="card">
                <h3>API Requests</h3>
                <div class="value">856.2k</div>
                <div class="status up">▲ 32% high traffic</div>
            </div>
            <!-- Card 4 -->
            <div class="card">
                <h3>Active Licenses</h3>
                <div class="value">142</div>
                <div class="status up">▲ 12 new users</div>
            </div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }
    </script>
</body>
</html>
